services:
  notesbro-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: notesbro-bot:latest
    container_name: notesbro-bot
    restart: unless-stopped
    command: ["python", "-m", "notesbro_bot", "--config", "/run/secrets/notesbro/settings.yaml"]
    volumes:
      - ./config/settings.yaml:/run/secrets/notesbro/settings.yaml:ro
      - notesbro_data:/app/data

volumes:
  notesbro_data:

